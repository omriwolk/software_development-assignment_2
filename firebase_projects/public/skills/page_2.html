<!DOCTYPE html>
<!-- Declares HTML5 document type -->

<html lang="en">
<!-- Sets language for accessibility and SEO -->

<head>
    <meta charset="UTF-8">
    <!-- Enables full character encoding support -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Makes page responsive on mobile devices -->

    <meta name="theme-color" content="#2c3e50">
    <!-- Sets browser theme color for mobile PWA UI -->

    <meta name="mobile-web-app-capable" content="yes">
    <!-- Enables full-screen app mode on Android -->

    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Enables PWA full-screen mode on iOS -->

    <title>CSS Demo</title>
    <!-- Browser tab title -->
    
    <link rel="stylesheet" href="../../main.css">
    <!-- Links global shared stylesheet -->

    <link rel="stylesheet" href="page2.css">
    <!-- Links page-specific CSS (different visual design from page1) -->
</head>

<body>

<script>
    // Checks if service workers are supported (PWA requirement)
    if ("serviceWorker" in navigator) {

        // Registers service worker for offline caching and installability
        navigator.serviceWorker.register("/service-worker.js")

        // Logs success message
        .then(() => console.log("Service Worker registered"))

        // Logs error if registration fails
        .catch(err => console.log("SW registration failed:", err));
    }
</script>

<nav>
    <!-- Navigation section -->

    <a href="./index.html">Skills</a>
    <!-- Link back to Skills page -->
</nav>

<header>
    <!-- Page header section -->

    <h1>CSS Demonstration</h1>
    <!-- Main title -->
</header>

<main class="container">
<!-- Main content container (styled via CSS layout system) -->

    <section class="card">
        <!-- First content block (styled via page2.css) -->

        <h2>Section One</h2>
        <p>This is the same HTML content.</p>
        <!-- Content reused from page1, but styled differently -->
    </section>

    <section class="card">
        <!-- Second content block -->

        <h2>Section Two</h2>
        <p>Only CSS changes how this looks.</p>
    </section>

    <section class="card">
        <!-- Third content block -->

        <h2>Section Three</h2>
        <p>Different layouts, colors, and animations.</p>
    </section>

</main>

</body>
</html>
